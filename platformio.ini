; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitm-1]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
monitor_speed = 115200

; This particular board has 4 MB flash (the default board def assumes 8 MB,
; which causes a boot loop: "Detected size(4096k) smaller than ...(8192k)").
board_upload.flash_size = 4MB
board_build.flash_size = 4MB
board_build.partitions = default.csv

; WeAct 2.9" e-paper driver (pulls in Adafruit GFX automatically)
lib_deps =
    zinggjm/GxEPD2@^1.5.8

; Flashing/monitoring over the board's NATIVE USB-C port (the one labeled "USB",
; not "UART"). These make Serial output appear over native USB CDC.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
